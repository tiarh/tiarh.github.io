<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <style>
      .box{fill:#0b1220;stroke:#334155;stroke-width:2;rx:14;}
      .t{font-family:Inter,system-ui;fill:#e2e8f0;font-size:18px;font-weight:600;}
      .s{font-family:Inter,system-ui;fill:#94a3b8;font-size:14px;}
      .a{stroke:#22d3ee;stroke-width:3;marker-end:url(#m);} 
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect class="box" x="30" y="60" width="190" height="110"/>
  <text class="t" x="55" y="105">NOC Operator</text>
  <text class="s" x="55" y="130">monitoring AREA</text>

  <rect class="box" x="260" y="40" width="250" height="150"/>
  <text class="t" x="285" y="85">Playwright Scraper</text>
  <text class="s" x="285" y="110">login → scrape table</text>
  <text class="s" x="285" y="132">render HTML</text>
  <text class="s" x="285" y="154">screenshot PNG</text>

  <rect class="box" x="560" y="40" width="300" height="150"/>
  <text class="t" x="585" y="85">Report Delivery</text>
  <text class="s" x="585" y="110">WhatsApp / Telegram</text>
  <text class="s" x="585" y="132">PNG report + caption</text>

  <line class="a" x1="220" y1="115" x2="260" y2="115"/>
  <line class="a" x1="510" y1="115" x2="560" y2="115"/>

  <text class="s" x="30" y="315">Skynet Ping Monitoring → Automated report pipeline</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <defs>
    <style>
      .box{fill:#0b1220;stroke:#334155;stroke-width:2;rx:14;}
      .t{font-family:Inter,system-ui;fill:#e2e8f0;font-size:18px;font-weight:600;}
      .s{font-family:Inter,system-ui;fill:#94a3b8;font-size:14px;}
      .a{stroke:#a78bfa;stroke-width:3;marker-end:url(#m);} 
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect class="box" x="30" y="60" width="220" height="110"/>
  <text class="t" x="55" y="105">Skynet Test Group</text>
  <text class="s" x="55" y="130">commands: monitoring, maps</text>

  <rect class="box" x="290" y="40" width="260" height="150"/>
  <text class="t" x="315" y="85">WA Bot Core</text>
  <text class="s" x="315" y="110">allowlist group</text>
  <text class="s" x="315" y="132">cooldown / retry</text>
  <text class="s" x="315" y="154">command router</text>

  <rect class="box" x="590" y="40" width="280" height="150"/>
  <text class="t" x="615" y="85">Handlers</text>
  <text class="s" x="615" y="110">Monitoring → PNG</text>
  <text class="s" x="615" y="132">Maps → search/rute</text>

  <line class="a" x1="250" y1="115" x2="290" y2="115"/>
  <line class="a" x1="550" y1="115" x2="590" y2="115"/>

  <text class="s" x="30" y="315">Scoped automation: safe ops responses in one WhatsApp group</text>
</svg>
